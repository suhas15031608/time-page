<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question For You 💖</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
            overflow: hidden;
            text-align: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 500px;
            width: 100%;
            transition: all 0.5s ease;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .names {
            color: #ffeef8;
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            position: relative;
            min-height: 60px;
        }

        button {
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transition: transform 0.1s ease, background 0.3s ease;
        }

        #yes-btn {
            background-color: #ff477e;
            color: white;
        }

        #yes-btn:hover {
            background-color: #ff2a65;
            transform: scale(1.1);
        }

        #no-btn {
            background-color: #ffffff;
            color: #ff477e;
            position: absolute;
            z-index: 10;
        }

        /* Success Screen Styles */
        .hidden {
            display: none !important;
        }

        .success-gif {
            width: 100%;
            max-width: 250px;
            border-radius: 15px;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Toast notifications for funny errors */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255, 255, 255, 0.9);
            color: #ff477e;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0;
            z-index: 100;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- Main Proposal Card -->
    <div id="proposal-card" class="container">
        <!-- CHANGE THE NAME HERE -->
        <h1>Will you forever be mine, [Doctreee...]? 🐻❤️</h1>
        <!-- CHANGE YOUR NAME HERE -->
        <p class="names">From: [suhas] 💌</p>
        
        <div class="btn-container">
            <button id="yes-btn">Yes 💖</button>
            <button id="no-btn">No 💔</button>
        </div>
    </div>

    <!-- Success Card (Hidden by default) -->
    <div id="success-card" class="container hidden">
        <h1>Yay! I knew you'd say YES! 🥰❤️</h1>
        <p style="color: white; margin-top: 10px;">You're the most amazing person I know. I love you endlessly.</p>
        <!-- Cute cat GIF placeholder -->
        <img class="success-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Z0cmRndmpxbXN0Y3N4dnd6b3M4M3R5N3Z0Y3N4dnd6b3M4M3R5ZiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/K1TtAsbIscM2gLSkT5/giphy.gif" alt="Cute Cat Celebration">
        <p style="color: #ffeef8; font-style: italic; font-size: 0.9rem;">~ Your Forever Person ✨</p>
    </div>

    <!-- Toast message overlay -->
    <div id="toast" class="toast">Error 404: No button not found 🚫</div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const proposalCard = document.getElementById('proposal-card');
        const successCard = document.getElementById('success-card');
        const toast = document.getElementById('toast');

        // Array of funny responses like the video
        const funnyMessages = [
            "Error 404: No button not found 🚫",
            "I'll pretend I didn't see that 😂",
            "LMAO ok, try again 😉",
            "That's so funny haha. Now say yes. 🙄",
            "Not an option, bubba! 💖",
            "Access Denied 🔒"
        ];

        // Function to move the "No" button dynamically
        function moveButton(e) {
            // Prevent default behavior on mobile touch
            if(e.type === 'touchstart') e.preventDefault();

            const padding = 20;
            // Generate random positions within the viewport boundaries
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            // Make sure coordinates stay positive and within screen bounds
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;

            // Trigger a random funny message alert
            showToast();
        }

        function showToast() {
            const randomMessage = funnyMessages[Math.floor(Math.random() * funnyMessages.length)];
            toast.innerText = randomMessage;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // Event listeners for both desktop hover and mobile taps
        noBtn.addEventListener('mouseenter', moveButton);
        noBtn.addEventListener('touchstart', moveButton);
        noBtn.addEventListener('click', (e) => {
            e.preventDefault();
            moveButton(e);
        });

        // Event listener for the "Yes" transition
        yesBtn.addEventListener('click', () => {
            proposalCard.classList.add('hidden');
            successCard.classList.remove('hidden');
            toast.classList.remove('show');
        });
    </script>
</body>
</html>
